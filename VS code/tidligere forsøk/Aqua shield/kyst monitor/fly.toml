app = "aquashield"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  ENABLE_SCHEDULED_TASKS = "true"
  NIGHTLY_ANALYSIS_HOUR = "23"

[[services]]
  internal_port = 8000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[[services]]
  protocol = "tcp"
  internal_port = 3000
  processes = ["web"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

[build]
  builder = "dockerfile"

[[mounts]]
  source = "aquashield_data"
  destination = "/app/data"
