version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aquashield-backend
    environment:
      DATABASE_URL: sqlite:///./aquashield.db
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      BARENTZWATCH_API_KEY: ${BARENTZWATCH_API_KEY}
      AIS_API_KEY: ${AIS_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - aquashield-data:/app/data
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    networks:
      - aquashield-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: aquashield-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aquashield-network

volumes:
  aquashield-data:

networks:
  aquashield-network:
    driver: bridge
