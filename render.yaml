services:
  - type: web
    name: aqua-shield
    runtime: node
    region: oregon
    plan: starter
    buildCommand: "cd client && npm ci && npm run build && cd ../server && npm ci --only=production"
    startCommand: "node server/index.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FORCE_REINIT
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: postgresql://postgres:x5BccVHm_-gsE2&@db.eiokuofueqsmhcglnhsv.supabase.co:5432/postgres

cron:
  - name: nightly-analysis
    schedule: "0 3 * * *" # daily at 03:00
    command: "cd server && node -e \"require('./cron/nightly').runNightlyAnalysis().then(r=>console.log(JSON.stringify(r))).catch(e=>console.error(e))\""

databases:
  - name: aqua-shield-db
    engine: postgres
    plan: starter
