<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kyst Monitor Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; margin: 0; }
    h1 { color: #3b82f6; }
  </style>
</head>
<body>
  <h1>Kyst Monitor Agent</h1>
  <p>Dette er en enkel side med en chat-agent-widget nederst til høyre.</p>

  <!-- Enkel chat-agent-widget -->
  <div id="chat-agent-widget" style="position: fixed; bottom: 24px; right: 24px; width: 320px; max-width: 90vw; z-index: 9999; font-family: inherit;">
    <div id="chat-header" style="background: #3b82f6; color: white; padding: 12px 16px; border-radius: 12px 12px 0 0; cursor: pointer;">
      💬 Kyst Monitor Agent
    </div>
    <div id="chat-body" style="background: #f3f4f6; border: 1px solid #3b82f6; border-top: none; border-radius: 0 0 12px 12px; display: none; flex-direction: column; height: 320px;">
      <div id="chat-messages" style="flex: 1; padding: 12px; overflow-y: auto; font-size: 15px;"></div>
      <form id="chat-form" style="display: flex; border-top: 1px solid #e5e7eb;">
        <input id="chat-input" type="text" placeholder="Skriv et spørsmål..." style="flex: 1; border: none; padding: 10px; border-radius: 0 0 0 12px; outline: none; font-size: 15px;" autocomplete="off" />
        <button type="submit" style="background: #3b82f6; color: white; border: none; padding: 0 18px; border-radius: 0 0 12px 0; cursor: pointer; font-size: 15px;">Send</button>
      </form>
    </div>
  </div>
  <script>
    // Enkel chat-widget logikk
    const chatHeader = document.getElementById('chat-header');
    const chatBody = document.getElementById('chat-body');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');
    let open = false;
    chatHeader.onclick = () => {
      open = !open;
      chatBody.style.display = open ? 'flex' : 'none';
    };
    chatForm.onsubmit = (e) => {
      e.preventDefault();
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatMessages.innerHTML += `<div style='margin-bottom:8px;'><b>Du:</b> ${msg}</div>`;
      chatInput.value = '';
      chatMessages.scrollTop = chatMessages.scrollHeight;
      // Dummy agent-svar
      setTimeout(() => {
        chatMessages.innerHTML += `<div style='margin-bottom:8px;'><b>Agent:</b> Dette er et eksempel på svar. (Ingen ekte AI-integrasjon ennå)</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 700);
    };
  </script>
</body>
</html>
