<!doctype html>
<html lang="nb">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kyst Monitor – Innlogging</title>
    <style>
        :root { color-scheme: light; }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eff6ff 0%, #ecfeff 100%);
            color: #0f172a;
        }
        .card {
            width: min(420px, calc(100vw - 32px));
            background: rgba(255,255,255,0.96);
            border: 1px solid #bfdbfe;
            border-radius: 18px;
            box-shadow: 0 24px 48px rgba(30,64,175,0.12);
            padding: 28px;
        }
        h1 { margin: 0 0 8px; font-size: 28px; }
        p { color: #475569; line-height: 1.5; }
        label { display: block; margin-top: 18px; margin-bottom: 8px; font-weight: 600; }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 16px;
            border: 0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #2563eb, #0f766e);
        }
        .status { min-height: 24px; margin-top: 12px; font-size: 14px; }
        .status.error { color: #b91c1c; }
        .status.ok { color: #166534; }
        .hint { margin-top: 16px; font-size: 13px; color: #64748b; }
    </style>
    <script src="./app/auth.js?v=20260320a"></script>
</head>
<body>
    <main class="card">
        <h1>Kyst Monitor</h1>
        <p>Denne demoen er passordbeskyttet. Skriv inn passord for å åpne Pilot Lite.</p>
        <form id="loginForm">
            <label for="password">Passord</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <button type="submit">Logg inn</button>
            <div id="status" class="status" aria-live="polite"></div>
        </form>
        <div class="hint">Passord kan styres via `DEMO_PASSWORD` i API-et. Standard er satt til kyst.</div>
    </main>
    <script>
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const statusEl = document.getElementById('status');

        async function boot() {
            const ok = await window.PilotLiteAuth.verifySession();
            if (ok) {
                statusEl.className = 'status ok';
                statusEl.textContent = 'Innlogging funnet. Sender deg videre...';
                window.PilotLiteAuth.redirectAfterLogin();
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            statusEl.className = 'status';
            statusEl.textContent = 'Logger inn...';
            try {
                await window.PilotLiteAuth.loginWithPassword(passwordInput.value);
                statusEl.className = 'status ok';
                statusEl.textContent = 'Innlogging OK. Sender deg videre...';
                window.PilotLiteAuth.redirectAfterLogin();
            } catch (error) {
                statusEl.className = 'status error';
                statusEl.textContent = error?.message || 'Innlogging feilet';
            }
        });

        boot();
    </script>
</body>
</html>
